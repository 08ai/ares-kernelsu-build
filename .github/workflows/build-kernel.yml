name: Build KernelSU Kernel (ares) - kprobe

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc cpio xz-utils libssl-dev libelf-dev python3 ccache

      - name: 克隆内核源码
        run: |
          git clone --depth=1 -b S https://github.com/Tkpointz/kernel_xiaomi_ares-s.git kernel
          cd kernel
          echo "内核版本:"
          head -5 Makefile

      - name: 安装 Proton Clang 13.0.0
        run: |
          cd kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "Proton Clang 版本:"
          clang/bin/clang --version

      - name: 集成 KernelSU v0.9.5
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          echo "✓ KernelSU 已集成"

      - name: 配置 defconfig (kprobe模式)
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/ares_user_defconfig"

          # 添加 KSU
          if ! grep -q "CONFIG_KSU" "$DEFCONFIG"; then
            echo "# KernelSU kprobe mode" >> "$DEFCONFIG"
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          else
            sed -i 's/.*CONFIG_KSU.*/CONFIG_KSU=y/' "$DEFCONFIG"
          fi

          # ⚠️ 不关 KPROBES — 用 kprobe 模式，不是手动 patch
          # 确保 kprobe 相关配置开启
          if ! grep -q "CONFIG_KPROBES=y" "$DEFCONFIG"; then
            echo "CONFIG_KPROBES=y" >> "$DEFCONFIG"
          fi
          if ! grep -q "CONFIG_HAVE_KPROBES=y" "$DEFCONFIG"; then
            echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG"
          fi
          if ! grep -q "CONFIG_KPROBE_EVENTS=y" "$DEFCONFIG"; then
            echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG"
          fi
          if ! grep -q "CONFIG_MODULES=y" "$DEFCONFIG"; then
            echo "CONFIG_MODULES=y" >> "$DEFCONFIG"
          fi

          echo "✓ defconfig 已配置 (kprobe模式, KPROBES保持开启)"

      - name: 编译内核
        run: |
          cd kernel
          mkdir -p out

          CL="${PWD}/clang/bin"

          echo "生成 .config..."
          make O=out ARCH=arm64 \
            HOSTCC=gcc \
            CC="${CL}/clang" \
            ares_user_defconfig

          echo "开始编译..."
          make O=out -j$(nproc) \
            ARCH=arm64 \
            HOSTCC=gcc \
            CC="${CL}/clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${CL}/aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="${CL}/arm-linux-gnueabi-" \
            LD="${CL}/ld.lld" \
            AR="${CL}/llvm-ar" \
            NM="${CL}/llvm-nm" \
            OBJCOPY="${CL}/llvm-objcopy" \
            OBJDUMP="${CL}/llvm-objdump" \
            STRIP="${CL}/llvm-strip" \
            CONFIG_NO_ERROR_ON_MISMATCH=y \
            2>&1 | tee out/build.log

          if [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "✅ 编译成功!"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "❌ 编译失败!"
            tail -100 out/build.log
            exit 1
          fi

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-ares-KernelSU
          path: kernel/out/arch/arm64/boot/Image.gz
          retention-days: 7

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/out/build.log
          retention-days: 7
