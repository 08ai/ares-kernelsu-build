name: Build KernelSU-SUSFS for ares (correct)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc cpio xz-utils libssl-dev libelf-dev python3 ccache git patch

      - name: 克隆内核源码
        run: |
          git clone --depth=1 -b S https://github.com/Tkpointz/kernel_xiaomi_ares-s.git kernel
          cd kernel
          echo "内核版本:"
          head -5 Makefile

      - name: 安装 Proton Clang 13.0.0
        run: |
          cd kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "Proton Clang 版本:"
          clang/bin/clang --version

      - name: 集成 KernelSU + SUSFS
        run: |
          cd kernel

          # Step 1: 集成原版 KernelSU
          echo "=== 集成 KernelSU ==="
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash

          # Step 2: 克隆 SUSFS 补丁 (kernel-4.14 分支)
          echo "=== 克隆 SUSFS 补丁 ==="
          git clone --depth=1 -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu

          # Step 3: 复制 SUSFS 源文件
          echo "=== 复制 SUSFS 源文件 ==="
          cp /tmp/susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp /tmp/susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          # Step 4: 应用 KernelSU SUSFS 补丁
          echo "=== 应用 KernelSU SUSFS 补丁 ==="
          cp /tmp/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch || echo "(patch applied with warnings)"
          cd ..

          # Step 5: 应用内核级 SUSFS 补丁
          echo "=== 应用内核 SUSFS 补丁 ==="
          cp /tmp/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 < 50_add_susfs_in_kernel-4.14.patch || echo "(patch applied with warnings)"

          # Step 6: 关键 — 禁用 kprobe 引用，改用 manual hook
          echo "=== 切换为 manual hook 模式 ==="
          find KernelSU -name "*.c" -o -name "*.h" | xargs sed -i 's|#ifdef CONFIG_KPROBES|#if 0|g' 2>/dev/null || true

          echo "✓ KernelSU + SUSFS 集成完成"

      - name: 配置 defconfig
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/ares_user_defconfig"

          # 确保 Kconfig 引用 SUSFS
          KCONFIG="arch/arm64/Kconfig"
          if ! grep -q "KernelSU/kernel/Kconfig" "$KCONFIG"; then
            echo "" >> "$KCONFIG"
            echo 'source "KernelSU/kernel/Kconfig"' >> "$KCONFIG"
          fi
          # 也要引用 fs/Kconfig 中的 SUSFS 选项
          if ! grep -q "fs/susfs" "$KCONFIG"; then
            echo 'source "fs/Kconfig.susfs"' >> "$KCONFIG" 2>/dev/null || true
          fi

          # 配置选项
          echo "# KernelSU + SUSFS (Manual Hook Mode)" >> "$DEFCONFIG"
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"

          echo "✓ defconfig 已配置"

      - name: 编译内核
        run: |
          cd kernel
          mkdir -p out

          CL="${PWD}/clang/bin"

          echo "生成 .config..."
          make O=out ARCH=arm64 HOSTCC=gcc CC="${CL}/clang" ares_user_defconfig 2>&1

          echo "验证 KSU 配置..."
          grep "CONFIG_KSU" out/.config || echo "(checking...)"

          echo "编译..."
          make O=out -j$(nproc) \
            ARCH=arm64 HOSTCC=gcc CC="${CL}/clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${CL}/aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="${CL}/arm-linux-gnueabi-" \
            LD="${CL}/ld.lld" AR="${CL}/llvm-ar" NM="${CL}/llvm-nm" \
            OBJCOPY="${CL}/llvm-objcopy" OBJDUMP="${CL}/llvm-objdump" STRIP="${CL}/llvm-strip" \
            CONFIG_NO_ERROR_ON_MISMATCH=y 2>&1 | tee out/build.log

          if [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "✅ 编译成功!"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "❌ 失败!"
            tail -80 out/build.log
            exit 1
          fi

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-ares-SUSFS
          path: kernel/out/arch/arm64/boot/Image.gz
          retention-days: 7

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/out/build.log
          retention-days: 7
