name: Build KernelSU-SUSFS for ares (kprobe-less)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc cpio xz-utils libssl-dev libelf-dev python3 ccache

      - name: 克隆内核源码
        run: |
          git clone --depth=1 -b S https://github.com/Tkpointz/kernel_xiaomi_ares-s.git kernel
          cd kernel
          echo "内核版本:"
          head -5 Makefile

      - name: 安装 Proton Clang 13.0.0
        run: |
          cd kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "Proton Clang 版本:"
          clang/bin/clang --version

      - name: 集成 KernelSU-SUSFS
        run: |
          cd kernel
          # 使用 SUSFS fork，不是原版 KernelSU
          curl -LSs "https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" | bash
          echo "✓ KernelSU-SUSFS 已集成"

      - name: 配置 defconfig (SUSFS模式)
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/ares_user_defconfig"

          # 基础 KSU
          if ! grep -q "CONFIG_KSU" "$DEFCONFIG"; then
            echo "# KernelSU-SUSFS" >> "$DEFCONFIG"
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          fi

          # SUSFS 核心配置 (13项，来自能用的 boot.img)
          cat >> "$DEFCONFIG" << 'EOF'
CONFIG_KSU_SUSFS=y
CONFIG_KSU_SUSFS_SUS_PATH=y
CONFIG_KSU_SUSFS_SUS_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
CONFIG_KSU_SUSFS_SUS_KSTAT=y
CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
CONFIG_KSU_SUSFS_TRY_UMOUNT=y
CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
CONFIG_KSU_SUSFS_SPOOF_UNAME=y
EOF

          echo "✓ defconfig 已配置 (SUSFS模式)"
          echo "已添加的 SUSFS 配置:"
          grep "CONFIG_KSU" "$DEFCONFIG"

      - name: 编译内核
        run: |
          cd kernel
          mkdir -p out

          CL="${PWD}/clang/bin"

          echo "生成 .config..."
          make O=out ARCH=arm64 \
            HOSTCC=gcc \
            CC="${CL}/clang" \
            ares_user_defconfig

          echo "验证 SUSFS 配置..."
          grep "CONFIG_KSU" out/.config

          echo "开始编译..."
          make O=out -j$(nproc) \
            ARCH=arm64 \
            HOSTCC=gcc \
            CC="${CL}/clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${CL}/aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="${CL}/arm-linux-gnueabi-" \
            LD="${CL}/ld.lld" \
            AR="${CL}/llvm-ar" \
            NM="${CL}/llvm-nm" \
            OBJCOPY="${CL}/llvm-objcopy" \
            OBJDUMP="${CL}/llvm-objdump" \
            STRIP="${CL}/llvm-strip" \
            CONFIG_NO_ERROR_ON_MISMATCH=y \
            2>&1 | tee out/build.log

          if [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "✅ 编译成功!"
            ls -lh out/arch/arm64/boot/Image.gz
            ls -lh out/arch/arm64/boot/Image
          else
            echo "❌ 编译失败!"
            tail -100 out/build.log
            exit 1
          fi

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-ares-SUSFS
          path: kernel/out/arch/arm64/boot/Image.gz
          retention-days: 7

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/out/build.log
          retention-days: 7
